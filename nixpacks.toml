# Fallback only if Railway builder is NIXPACKS (not recommended).
# Preferred: railway.json → builder DOCKERFILE + Dockerfile
#
# Do not add [phases.setup] unless you include "..." — see RAILWAY.md

[variables]
NIXPACKS_PYTHON_VERSION = "3.12"

[phases.install]
# Must use venv pip path; plain "pip" is not on PATH in the install layer.
cmds = ["/opt/venv/bin/python -m pip install -r requirements-railway.txt"]
